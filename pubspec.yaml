name: studio
description: Aria — offline-first music player for iOS and Android
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  dio: ^5.8.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.3.7
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  uuid: ^4.5.1
  permission_handler: ^12.0.1
  home_widget: ^0.7.0
  live_activities: ^2.4.9
  shared_preferences: ^2.5.3
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/seed/
    - assets/branding/app_icon.png
    - assets/branding/splash.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/branding/app_icon.png
    icon_background_color: "#FFFFFF"
  ios: true
  web: false
  fullscreen: true
